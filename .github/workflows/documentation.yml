name: Documentation

on:
  push:
    branches: [main, develop]
    paths:
      - "src/**"
      - "docs/**"
      - "examples/**"
      - "scripts/GenerateDocs.lean"
  pull_request:
    branches: [main, develop]
    paths:
      - "src/**"
      - "docs/**"
      - "examples/**"

concurrency:
  group: docs-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build-docs:
    name: Build documentation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Select Lean toolchain
        run: |
          elan install "$(cat lean-toolchain)"
          elan default "$(cat lean-toolchain)"

      - name: Cache Lake build
        uses: actions/cache@v4
        with:
          path: .lake
          key: ${{ runner.os }}-lake-docs-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lake-docs-

      - name: Build project
        run: lake build

      - name: Run generate-docs
        run: lake exe generate-docs

      - name: Generate API docs (Python)
        run: python3 scripts/generate-api-docs.py

      - name: Build MkDocs site
        run: |
          cd docs
          pip install -r requirements.txt
          mkdocs build

      - name: Validate documentation
        run: |
          python3 scripts/validate-docs.py
          python3 scripts/check-docs.py

      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: mkdocs-site
          path: docs/_site

  deploy-docs:
    name: Deploy to GitHub Pages
    needs: build-docs
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download site
        uses: actions/download-artifact@v4
        with:
          name: mkdocs-site
          path: site

      - name: Publish
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
