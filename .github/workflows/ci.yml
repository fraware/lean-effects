name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * *"

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    name: Build and verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install elan
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh | sh -s -- -y
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Select Lean toolchain
        run: |
          elan install "$(cat lean-toolchain)"
          elan default "$(cat lean-toolchain)"

      - name: Cache Lake build
        uses: actions/cache@v4
        with:
          path: |
            .lake
          key: ${{ runner.os }}-lake-${{ hashFiles('lean-toolchain', 'lake-manifest.json') }}
          restore-keys: |
            ${{ runner.os }}-lake-

      - name: Build (Effects, Tests, Bench, CLI, tooling)
        run: lake build

      - name: No sorry in library sources
        run: |
          if grep -RInE --include='*.lean' '\bsorry\b' src/ | grep -v 'Effects/Std/Nondet.lean'; then
            echo "::error::Found sorry in src/ (outside tracked Nondet gap)"
            exit 1
          fi

      - name: Run test-suite executable
        run: lake exe test-suite

      - name: Performance monitor
        run: lake exe performance-monitor
        env:
          EFFECTS_TELEMETRY: "true"

      - name: Coverage report (heuristic)
        run: lake exe coverage-report

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

      - name: Upload to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage/lcov.info
          fail_ci_if_error: false
